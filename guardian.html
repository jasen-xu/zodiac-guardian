<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">生肖守护神</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 生肖选择列表页（无 id 参数时显示） -->
    <div class="guardian-list-page" id="guardianListPage">
        <nav class="top-nav">
            <div class="nav-inner">
                <a href="index.html" class="nav-brand">易道</a>
                <div class="nav-links">
                    <a href="index.html" class="nav-link">返回首页</a>
                </div>
            </div>
        </nav>

        <header class="guardian-list-header">
            <h1 class="guardian-list-title">十二生肖守护神</h1>
            <div class="gold-line"></div>
            <p class="guardian-list-subtitle">选择你的生肖，查看专属守护佛菩萨</p>
        </header>

        <div class="cloud-divider">☁ ☁ ☁</div>

        <main class="guardian-list-main">
            <div class="guardian-zodiac-grid" id="guardianZodiacGrid">
                <!-- 生肖卡片通过 JavaScript 动态生成 -->
            </div>
        </main>

        <div class="cloud-divider">☁ ☁ ☁</div>

        <footer class="site-footer">
            <div class="footer-content">
                <p class="footer-brand">易道</p>
                <p class="footer-desc">传承千年易学智慧，融合现代科技呈现</p>
                <p class="footer-copy">© 2026 易道 | 仅供文化学习与娱乐参考，不构成任何决策建议</p>
            </div>
        </footer>
    </div>

    <!-- 守护神详情页（有 id 参数时显示） -->
    <div class="guardian-page" id="guardianDetailPage" style="display:none;">
        <!-- 视频播放层 -->
        <div class="video-overlay" id="videoOverlay" style="display:none;">
            <video id="guardianVideo" class="guardian-video" playsinline webkit-playsinline muted>
                <source src="" type="video/mp4">
            </video>
            <div class="video-skip-btn" id="videoSkipBtn" onclick="skipVideo()">跳过</div>
        </div>

        <div class="image-full-container">
            <img id="guardianImage" src="" alt="守护神图片" class="guardian-image-full">
            
            <div class="overlay-content">
                <div class="text-area-top">
                    <div class="blessing-columns">
                        <p class="blessing-col-1" id="blessingCol1"></p>
                        <p class="blessing-col-2" id="blessingCol2"></p>
                    </div>
                    <div class="description-columns">
                        <p class="description-col-1" id="descriptionCol1"></p>
                        <p class="description-col-2" id="descriptionCol2"></p>
                    </div>
                </div>

                <audio id="audioPlayer" autoplay loop style="display: none;">
                    <source id="audioSource" src="" type="audio/mpeg">
                </audio>
            </div>
        </div>

        <!-- 每日一签入口 -->
        <div class="fortune-entrance-bottom">
            <a href="fortune.html" class="fortune-button-bottom">
                <span class="fortune-icon-bottom">🎋</span>
                <span class="fortune-text-bottom">每日一签</span>
            </a>
        </div>
    </div>

    <script src="js/zodiac-data.js?v=20260608"></script>
    <script src="js/detail.js?v=20260608"></script>
</body>
</html>
